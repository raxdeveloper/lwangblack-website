  <style>
      .filters-container {
          display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 4rem; justify-content: center;
      }
      .filter-btn {
          background: transparent; border: 1px solid var(--border-color); color: var(--text-muted);
          padding: 0.6rem 1.5rem; border-radius: 50px; font-family: var(--font-micro);
          font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
      }
      .filter-btn:hover, .filter-btn.active {
          background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary);
      }
      
      .variant-options { display: flex; gap: 0.5rem; margin-top: 1rem; margin-bottom: 1rem; }
      .variant-btn {
          background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted);
          padding: 0.4rem 0.9rem; font-size: 0.7rem; cursor: pointer; border-radius: 50px;
          transition: all 0.3s;
          font-family: var(--font-body); text-transform: uppercase; letter-spacing: 1px;
      }
      .variant-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
      .variant-btn.selected { background: #fff; color: #0a0b0a; border-color: #fff; font-weight: 500;}
      
      #cartToast {
          position: fixed; bottom: 40px; right: 40px; background: var(--accent); color: #fff;
          font-family: var(--font-micro); font-size: 0.8rem; letter-spacing: 1px; padding: 1rem 2rem;
          border-radius: 50px; z-index: 10000; text-transform: uppercase;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #cartToast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

  </div>

  <!-- FIXED PARALLAX BACKGROUND -->
  <!-- Removed bottle animation -->

  <!-- NAVIGATION -->
    <nav class="site-nav" id="siteNav">
    <!-- Left links -->
    <div class="nav-links nav-left">
      <a href="index.html" id="nav-home">HOME</a>
      <a href="shop.html" id="nav-shop">SHOP</a>
      <a href="reviews.html" id="nav-reviews">REVIEWS</a>
    </div>

    <!-- Center: logo + flag bar below it -->
    <div class="nav-center">
      <a href="index.html" class="nav-brand" id="navBrand">
        <img src="images/logo-hero.png" alt="Lwang Black Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span style="display:none; font-family:var(--font-heading); font-size:1.5rem; color:#fff;">LWANG BLACK</span>

    <!-- Right links + region switcher -->

      <a href="health-benefits.html" id="nav-benefits">BENEFITS</a>
      <a href="contact.html" id="nav-contact">CONTACT</a>
      <!-- Region Switcher injected here by region.js -->
      <a href="shop.html" class="btn-solid" style="padding:0.5rem 1.5rem;" id="nav-cta">SHOP NOW</a>
    </div>
  </nav>

  <!-- === HERO === -->
  <section class="fullscreen-section centered hero" style="min-height: 60vh; padding-top: 10rem;">
      <div class="hero-reveal" style="text-align: center;">
          <h1 class="title-massive" style="font-size: clamp(4rem, 10vw, 8rem);">CATALOGUE</h1>
          <div class="vertical-line" style="margin: 2rem auto; height: 40px;"></div>
          <p class="subtitle" style="margin: 0 auto;">Clove coffee, accessories, bundles & apparel — shipped across Nepal</p>
      </div>
  </section>

  <!-- === PRODUCTS GRID === -->
  <section class="fullscreen-section" style="align-items: flex-start; min-height: 100vh; padding-bottom: 8rem;">
      <div style="width: 100%; max-width: 1400px; margin: 0 auto;" class="gsap-reveal-up">
          
          <div class="filters-container">
              <button class="filter-btn active" data-filter="all">ALL</button>
              <button class="filter-btn" data-filter="coffee">COFFEE</button>
              <button class="filter-btn" data-filter="accessories">ACCESSORIES</button>
              <button class="filter-btn" data-filter="bundles">BUNDLES</button>
              <button class="filter-btn" data-filter="apparel">APPAREL</button>
          </div>

          <div class="product-grid">
          </div>
      </div>
  </section>

  <!-- === FOOTER === -->
  <footer class="site-footer" id="contact" style="padding-top: 4rem;">
      <div class="footer-bottom">
          <span>2026 © LWANG BLACK</span>
          <span><a href="index.html" style="text-decoration: underline;">BACK TO HOME</a></span>
          <span>PAN: 622414599</span>
      </div>
  </footer>

  <!-- Toast -->
  <div id="cartToast">ADDED TO CART</div>

  <script src="pricing.js"></script>
  <script src="geo-router.js"></script>
  <script src="region.js"></script>
  <script src="cart.js"></script>
  <script src="script.js"></script>
  <script>
      // Update Prices dynamically based on Region
      function renderCatalogueProducts() {
          const grid = document.querySelector('.product-grid');
          if (!grid || !window.LB_PRODUCTS) return;
          const code = window.LB_REGION ? window.LB_REGION.get() : 'NP';

          let html = '';
          for (const [id, prod] of Object.entries(window.LB_PRODUCTS)) {
              // Check availability
              if (prod.allowed_regions !== 'ALL' && Array.isArray(prod.allowed_regions) && !prod.allowed_regions.includes(code)) continue;

              let priceData = window.getProductPrice ? window.getProductPrice(id, code) : (prod.prices[code] || prod.prices.DEFAULT);
              if (!priceData) priceData = prod.prices.DEFAULT;
              if (!priceData) continue; // Skip if no price

              const priceDisplay = priceData.display;

              // Variants handling
              let variantsHtml = '';
              if (prod.variants && prod.variants.length > 0) {
                  variantsHtml = '<div class="variant-options" onclick="event.stopPropagation()">';
                  prod.variants.forEach((v, idx) => {
                      variantsHtml += `<button class="variant-btn ${idx === 0 ? 'selected' : ''}" data-variant="${v}">${v}</button>`;
                  });
                  variantsHtml += '</div>';
              }

              html += `
              <div class="product-card" data-category="${prod.category}" data-product-id="${id}" onclick="if(!event.target.classList.contains('add-btn') && !event.target.classList.contains('variant-btn')) window.location='product.html?id=${id}'" style="cursor: pointer;">
                  <img src="${prod.image}" alt="${prod.name}" class="product-img" loading="lazy" />
                  <span class="label-micro" style="margin-bottom: 0.5rem;">${prod.category.toUpperCase()} ${prod.badge ? "— " + prod.badge : ""}</span>
                  <h3 style="font-size: 1.8rem; margin-bottom: 1rem;">${prod.name}</h3>
                  <p style="margin-bottom: ${variantsHtml ? '1rem' : '2rem'}; flex-grow: 1; color: var(--text-muted); font-size: 0.9rem;">${prod.description}</p>
                  ${variantsHtml}
                  <div style="display: flex; justify-content: space-between; align-items: center;">
                      <span style="font-family: var(--font-heading); font-size: 1.5rem;">${priceDisplay}</span>
                      <button class="btn-solid add-btn" data-id="${id}" style="padding: 0.8rem 1.5rem;">ADD</button>
                  </div>
              </div>
              `;
          }
          grid.innerHTML = html;

          // Re-apply filter logic to show/hide correctly
          const activeFilterBtn = document.querySelector('.filter-btn.active');
          const filter = activeFilterBtn ? activeFilterBtn.dataset.filter : 'all';
          document.querySelectorAll('.product-card').forEach(card => {
              if (filter === 'all' || card.dataset.category === filter) card.style.display = 'flex';
              else card.style.display = 'none';
          });
          if (window.ScrollTrigger) ScrollTrigger.refresh();

          // Bind add-btn
          document.querySelectorAll('.add-btn').forEach(btn => {
              btn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  const pid = btn.dataset.id;
                  let selectedVariant = null;
                  const card = btn.closest('.product-card');
                  const selectedBtn = card.querySelector('.variant-btn.selected');
                  if (selectedBtn) selectedVariant = selectedBtn.dataset.variant;

                  if (window.LB_CART) LB_CART.add(pid, selectedVariant);
              });
          });

          // Bind variants
          document.querySelectorAll('.variant-btn').forEach(btn => {
              btn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  const group = e.target.closest('.variant-options');
                  group.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
                  btn.classList.add('selected');
                  
                  // Swap image
                  const card = btn.closest('.product-card');
                  const pid = card.dataset.productId;
                  const vName = btn.dataset.variant || btn.textContent;
                  const prod = window.LB_PRODUCTS[pid];
                  if (prod && prod.variantImages && prod.variantImages[vName]) {
                     const img = card.querySelector('.product-img');
                     gsap.to(img, { opacity: 0.1, duration: 0.2, onComplete: () => {
                         img.src = prod.variantImages[vName];
                         gsap.to(img, { opacity: 1, duration: 0.3 });
                     }});
                  }
              });
          });
      }

      document.addEventListener('lb:regionChanged', renderCatalogueProducts);
      document.addEventListener('DOMContentLoaded', () => { setTimeout(renderCatalogueProducts, 150); });
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
              document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              const filter = btn.dataset.filter;
              document.querySelectorAll('.product-card').forEach(card => {
                  if (filter === 'all' || card.dataset.category === filter) card.style.display = 'flex';
                  else card.style.display = 'none';
              });
              ScrollTrigger.refresh();
          });
      });
  </script>
</body>
</html>
