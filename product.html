<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details – Lwang Black</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="region-style.css?v=3" />
  <link rel="stylesheet" href="ecommerce.css" />
</head>
<body>

  <!-- NAVIGATION -->
    <nav class="site-nav" id="siteNav">
    <!-- Left links -->
    <div class="nav-links nav-left">
      <a href="index.html" id="nav-home">HOME</a>
      <a href="shop.html" id="nav-shop">SHOP</a>
      <a href="reviews.html" id="nav-reviews">REVIEWS</a>
    </div>

    <!-- Center: logo + flag bar below it -->
    <div class="nav-center">
      <a href="index.html" class="nav-brand" id="navBrand">
        <img src="images/logo-hero.png" alt="Lwang Black Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span style="display:none; font-family:var(--font-heading); font-size:1.5rem; color:#fff;">LWANG BLACK</span>
      </a>
      <!-- Flag bar injected here by region.js -->
    </div>

    <!-- Right links + region switcher -->
    <div class="nav-links nav-right">
      <a href="health-benefits.html" id="nav-benefits">BENEFITS</a>
      <a href="contact.html" id="nav-contact">CONTACT</a>
      <!-- Region Switcher injected here by region.js -->
      <a href="shop.html" class="btn-solid" style="padding:0.5rem 1.5rem;" id="nav-cta">SHOP NOW</a>
    </div>
  </nav>

  <!-- PRODUCT CONTAINER -->
  <main class="product-page-wrap">
    
    <!-- Breadcrumb -->
    <div class="pp-breadcrumb" id="pp-crumb">
      <a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <span id="pp-crumb-name">...</span>
    </div>

    <!-- Main Split Grid -->
    <div class="pp-grid">
      <!-- Left: Image -->
      <div class="pp-image-wrap">
        <img src="" alt="Product Image" class="pp-image" id="pp-image" onerror="this.src='images/product-hero-500g.jpg'" />
      </div>

      <!-- Right: Details -->
      <div class="pp-details" id="pp-details">
        <span class="label-micro" id="pp-category" style="margin-bottom:0.5rem; display:block;">—</span>
        <h1 class="pp-title" id="pp-title">Loading...</h1>
        
        <div class="pp-price-wrap" id="pp-price-area" style="display:none;">
          <span class="pp-price" id="pp-price">—</span>
          <span class="pp-tax-note">Tax included. Shipping calculated at checkout.</span>
        </div>

        <p class="pp-description" id="pp-desc"></p>

        <div id="pp-variants-container" style="margin-bottom: 2rem;"></div>

        <!-- Add to cart config -->
        <div id="pp-availability-box">
          <div class="pp-actions" id="pp-actions-area">
            <div class="pp-qty-wrap">
              <button class="pp-qty-btn" onclick="updateLocalQty(-1)">−</button>
              <input type="number" class="pp-qty-input" id="pp-qty" value="1" min="1" max="99" readonly />
              <button class="pp-qty-btn" onclick="updateLocalQty(1)">+</button>
            </div>
            <button class="btn-solid pp-add-btn" id="pp-add-to-cart" onclick="triggerAddToCart()">ADD TO CART</button>
          </div>
        </div>

        <!-- Not available state -->
        <div class="pp-unavailable-box" id="pp-unavailable-msg" style="display:none; margin-top:1rem;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          <div>
            <strong style="display:block; margin-bottom:0.2rem;">Not Available in Your Region</strong>
            This product cannot be shipped to your current country.
          </div>
        </div>

        <!-- Trust Badges -->
        <div class="pp-trust">
          <div class="pp-trust-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2e624c" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Secure Checkout</div>
          <div class="pp-trust-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2e624c" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Fast Shipping</div>
          <div class="pp-trust-item" id="pp-trust-stock"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2e624c" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg> In Stock</div>
        </div>
      </div>
    </div>

    <!-- Recommendations -->
    <section class="pp-recommendations" id="pp-recs-section" style="display:none;">
      <h3>You May Also Like</h3>
      <div class="product-grid" id="pp-recs-grid"></div>
    </section>

  </main>

  <!-- Cart Toast -->
  <div id="cartToast">ADDED TO CART</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="pricing.js"></script>
  <script src="region.js"></script>
  <script src="cart.js"></script>
  
  <script>
    let currentProductId = null;
    let selectedVariant = null;

    function getParam(p) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(p);
    }

    function updateLocalQty(delta) {
      const input = document.getElementById('pp-qty');
      let val = parseInt(input.value) + delta;
      if (val < 1) val = 1;
      if (val > 99) val = 99;
      input.value = val;
    }

    function selectVariant(val, btn) {
      selectedVariant = val;
      const buttons = document.querySelectorAll('.variant-btn');
      buttons.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    function triggerAddToCart() {
      if (!currentProductId || !window.LB_CART) return;
      
      const qty = parseInt(document.getElementById('pp-qty').value) || 1;
      
      // Update cart backend
      window.LB_CART.add(currentProductId, selectedVariant, qty);
      
      // Flash button
      const btn = document.getElementById('pp-add-to-cart');
      const originalText = btn.textContent;
      btn.textContent = '✓ ADDED TO CART';
      btn.style.background = '#2e624c';
      btn.style.color = '#fff';
      
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '';
        btn.style.color = '';
      }, 2000);
    }

    function renderProduct() {
      const id = getParam('id');
      if (!id || !window.LB_PRODUCTS || !window.LB_PRODUCTS[id]) {
        document.getElementById('pp-details').innerHTML = '<h1 style="color:#fff;font-family:EB Garamond;">Product not found</h1><a href="shop.html" class="btn-solid" style="margin-top:2rem;">RETURN TO SHOP</a>';
        return;
      }

      currentProductId = id;
      const product = window.LB_PRODUCTS[id];
      const countryCode = window.LB_REGION?.get() || 'NP';

      // Basic Details
      document.title = `${product.name} – Lwang Black`;
      document.getElementById('pp-crumb-name').textContent = product.name;
      document.getElementById('pp-image').src = product.image;
      document.getElementById('pp-category').textContent = product.category.toUpperCase();
      document.getElementById('pp-title').textContent = product.name;
      document.getElementById('pp-desc').textContent = product.description;

      // Variants
      const vContainer = document.getElementById('pp-variants-container');
      if (product.variants && product.variants.length > 0) {
        selectedVariant = product.variants[0];
        vContainer.innerHTML = `
          <div class="label-micro" style="margin-bottom:0.8rem; display:block;">SELECT VARIANT</div>
          <div class="variant-options" style="margin-bottom:0.5rem;">
            ${product.variants.map((v, i) => `
              <button class="variant-btn ${i===0?'selected':''}" onclick="selectVariant('${v}', this)">${v}</button>
            `).join('')}
          </div>
        `;
      } else {
        selectedVariant = null;
        vContainer.innerHTML = '';
      }

      // Check Availability / Pricing
      const priceObj = window.getProductPrice(id, countryCode);
      const isAvailable = !!priceObj;

      if (isAvailable) {
        document.getElementById('pp-price-area').style.display = 'flex';
        document.getElementById('pp-price').textContent = priceObj.display;
        document.getElementById('pp-actions-area').style.display = 'flex';
        document.getElementById('pp-unavailable-msg').style.display = 'none';
        document.getElementById('pp-trust-stock').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2e624c" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg> In Stock';
      } else {
        document.getElementById('pp-price-area').style.display = 'none';
        document.getElementById('pp-actions-area').style.display = 'none';
        document.getElementById('pp-unavailable-msg').style.display = 'flex';
        document.getElementById('pp-trust-stock').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff6464" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> Out of Stock in Region';
      }

      // Render Recommendations
      renderRecommendations(id, countryCode);

      // Animate in securely (avoid gsap.from stacking bugs)
      gsap.killTweensOf('.pp-image-wrap');
      gsap.killTweensOf('.pp-details > *');
      gsap.fromTo('.pp-image-wrap', 
        { opacity: 0, x: -30 }, 
        { opacity: 1, x: 0, duration: 0.8, ease: 'power2.out' }
      );
      gsap.fromTo('.pp-details > *', 
        { opacity: 0, y: 20 }, 
        { opacity: 1, y: 0, duration: 0.6, stagger: 0.1, ease: 'power2.out', delay: 0.2 }
      );
    }

    function renderRecommendations(currentId, countryCode) {
      if (!window.LB_PRODUCTS) return;
      
      const currentCat = window.LB_PRODUCTS[currentId].category;
      const allProducts = Object.values(window.LB_PRODUCTS);
      
      // Filter out current product, and only include available ones
      const available = allProducts.filter(p => p.id !== currentId && window.isProductAvailable(p.id, countryCode));
      
      if (available.length === 0) return;

      // Try to get 3 from same category, fallback to random
      let priority = available.filter(p => p.category === currentCat);
      let others = available.filter(p => p.category !== currentCat);
      
      // Shuffle helper
      const shuffle = arr => arr.sort(() => 0.5 - Math.random());
      
      shuffle(priority);
      shuffle(others);
      
      let recs = [...priority, ...others].slice(0, 3);
      
      const grid = document.getElementById('pp-recs-grid');
      grid.innerHTML = recs.map(p => {
        const priceObj = window.getProductPrice(p.id, countryCode);
        const badgeHtml = p.badge ? `<div class="product-badge">${p.badge}</div>` : '';
        const labelColor = p.category === 'bundles' ? 'color: var(--accent);' : '';
        
        return `
          <div class="product-card" data-category="${p.category}">
            ${badgeHtml}
            <a href="product.html?id=${p.id}" style="display:block; overflow:hidden; border-radius:8px;">
              <img src="${p.image}" alt="${p.name}" class="product-img" style="cursor:pointer;" onerror="this.src='images/product-hero-500g.jpg'" />
            </a>
            <span class="label-micro" style="margin-bottom:0.5rem;${labelColor}">${p.category.toUpperCase()}</span>
            <h2 style="font-family:var(--font-heading); font-size:1.8rem; margin-bottom:1rem; font-weight:400;">
              <a href="product.html?id=${p.id}" style="color:inherit; text-decoration:none;">${p.name}</a>
            </h2>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
              <span style="font-family:var(--font-heading); font-size:1.5rem;">${priceObj.display}</span>
              <a href="product.html?id=${p.id}" class="btn-solid" style="padding:0.7rem 1.2rem; text-decoration:none;">VIEW</a>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('pp-recs-section').style.display = 'block';
    }

    // Listen for region changes
    document.addEventListener('lb:regionChanged', () => {
      renderProduct(); 
    });

    // Init Page
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(renderProduct, 150); // wait for region to load
    });
  </script>
</body>
</html>
