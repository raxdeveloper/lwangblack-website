# Render Blueprint — API web + optional background worker + Postgres + Redis.
# New Blueprint → select this file. Set "sync: false" secrets in the Render dashboard.
# Autoscaling: upgrade the web service plan in the dashboard (Starter+); workers scale independently.
services:
  - type: web
    name: lwang-black-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: lwang-black-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lwang-black-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # Payments
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: ESEWA_MERCHANT_ID
        sync: false
      - key: ESEWA_SECRET_KEY
        sync: false
      - key: ESEWA_MODE
        sync: false
      # Khalti (Nepal)
      - key: KHALTI_SECRET_KEY
        sync: false
      - key: KHALTI_PUBLIC_KEY
        sync: false
      - key: KHALTI_MODE
        sync: false
      # Nabil Bank (Nepal)
      - key: NABIL_MERCHANT_ID
        sync: false
      - key: NABIL_SECRET_KEY
        sync: false
      - key: NABIL_MODE
        sync: false
      # COD (Nepal only)
      - key: COD_ENABLED
        sync: false
      # Shopify (Storefront + Admin + webhooks)
      - key: SHOPIFY_ENABLED
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_ADMIN_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2024-10"
      # Logistics / carriers — optional env fallbacks.
      # Primary config lives in the admin DB (Admin → Settings → Shipping);
      # these env vars are used only when the DB has no value for a key.
      # USPS (US)
      - key: USPS_USER_ID
        sync: false
      - key: USPS_PASSWORD
        sync: false
      - key: USPS_FROM_ZIP
        sync: false
      - key: USPS_TEST_MODE
        sync: false
      # Australia Post (AU + international)
      - key: AUSPOST_API_KEY
        sync: false
      # NZ Post
      - key: NZPOST_API_KEY
        sync: false
      - key: NZPOST_CLIENT_ID
        sync: false
      - key: NZPOST_CLIENT_SECRET
        sync: false
      # Japan Post
      - key: JAPANPOST_API_KEY
        sync: false
      # Chit Chats (Canada)
      - key: CHITCHATS_API_KEY
        sync: false
      - key: CHITCHATS_CLIENT_ID
        sync: false
      # Pathao (Nepal) — OAuth2 requires all 5 fields
      - key: PATHAO_CLIENT_ID
        sync: false
      - key: PATHAO_SECRET_KEY
        sync: false
      - key: PATHAO_CLIENT_EMAIL
        sync: false
      - key: PATHAO_CLIENT_PASSWORD
        sync: false
      - key: PATHAO_STORE_ID
        sync: false
      - key: PATHAO_LIVE
        sync: false
      # Social media — Facebook / Instagram / TikTok
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: TIKTOK_APP_KEY
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: TIKTOK_REDIRECT_URI
        sync: false
      # Email + SMS
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: brewed@lwangblack.co
      - key: SENDGRID_FROM_NAME
        value: Lwang Black
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  # Long-running worker (webhook DLQ / scheduled jobs — extend src/workers/queue.js)
  - type: worker
    name: lwang-black-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: node src/workers/queue.js
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lwang-black-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lwang-black-redis
          type: redis
          property: connectionString

  - type: redis
    name: lwang-black-redis
    plan: free
    # Empty ipAllowList = internal-only: only the lwang-black-api and
    # lwang-black-worker services (same Render account/region) can connect.
    # No public internet access. Add entries like `- source: 0.0.0.0/0` if you
    # ever need to reach Redis from outside Render.
    ipAllowList: []

databases:
  - name: lwang-black-db
    plan: free
    databaseName: lwangblack
    user: lwangblack
    # Internal-only Postgres. Render's managed services in the same region
    # connect over the private network automatically.
    ipAllowList: []
